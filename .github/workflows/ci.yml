name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  HUB_URL: https://cloud-console-21805978769.asia-southeast2.run.app
  FIREBASE_PROJECT_ID: gcp-bridge-meshvpn

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_HUB_API_URL: ${{ env.HUB_URL }}
          NEXT_PUBLIC_CLOUD_CONSOLE_URL: ${{ env.HUB_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT_ID }}
          # Next.js standalone build is memory-intensive; 4 GB prevents OOM on large pages
          NODE_OPTIONS: "--max_old_space_size=4096"
