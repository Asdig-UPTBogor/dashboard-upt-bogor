<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<title>UPT Bogor — CE Next Level Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="styles.css"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="device-switcher.css"/>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="charts.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="page.jsx"></script>
<script type="text/babel" src="tweaks.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "density": "compact",
  "accentName": "Amber",
  "heroLayout": "split",
  "showCallout": false,
  "sidebarCollapsed": false,
  "sparkKPI": false
}/*EDITMODE-END*/;

function App() {
  const [settings, setSettings] = useState(TWEAK_DEFAULTS);
  const [active, setActive] = useState('ce-next');
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [editAvailable, setEditAvailable] = useState(false);

  // Apply theme + density + accent
  useEffect(() => {
    document.documentElement.dataset.theme = settings.theme;
    document.documentElement.dataset.density = settings.density;
    const a = ACCENT_OPTIONS.find(x => x.name === settings.accentName) || ACCENT_OPTIONS[0];
    document.documentElement.style.setProperty('--accent', a.accent);
    document.documentElement.style.setProperty('--accent-2', a.accent2);
  }, [settings]);

  // Edit-mode protocol
  useEffect(() => {
    const h = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  return (
    <div style={{display: 'flex', minHeight: '100vh', background: 'var(--bg-0)'}}>
      <Sidebar active={active} onSelect={setActive} collapsed={settings.sidebarCollapsed}/>
      <div style={{flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column'}}>
        <Topbar
          onToggleSidebar={() => setSettings({...settings, sidebarCollapsed: !settings.sidebarCollapsed})}
          theme={settings.theme}
          setTheme={(t) => setSettings({...settings, theme: t})}
          onToggleTweaks={() => setTweaksOpen(v => !v)}
          tweaksOpen={tweaksOpen}
        />
        <main style={{flex: 1, overflowY: 'auto'}}>
          <CENextLevelPage/>
        </main>
      </div>
      <TweaksPanel
        open={tweaksOpen}
        settings={settings}
        setSettings={setSettings}
        onClose={() => setTweaksOpen(false)}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script src="device-switcher.js"></script>
</body>
</html>
